name: Chore / refactor
description: Maintenance, cleanup, docs, or refactor — no user-visible change
labels: ["chore"]
body:
  - type: input
    id: summary
    attributes:
      label: Summary
      description: One sentence description of the task.
      placeholder: e.g. Extract resolveTokens() into a shared util module
    validations:
      required: true

  - type: textarea
    id: details
    attributes:
      label: Details
      description: What needs doing and why?
    validations:
      required: true

  - type: textarea
    id: acceptance_criteria
    attributes:
      label: Acceptance criteria
      value: |
        - [ ] …
        - [ ] …
    validations:
      required: false

  - type: textarea
    id: affected_files
    attributes:
      label: Affected files
      placeholder: e.g. content.js, background.js
    validations:
      required: false

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - sidebar
        - options
        - url-groups
        - storage
        - dx
        - other
    validations:
      required: true

  - type: markdown
    attributes:
      value: |
        ---
        ## For Claude Code

        Before touching anything, read these in order:
        1. `bookmarklets-state.md` — current feature status, known issues, architecture notes. Do **not** edit this file directly.
        2. `README.md` — user-facing overview and setup instructions.
        3. `docs/` — store listing, privacy policy, release plan.
        4. Any files listed in "Affected files" above.

        **Branch:** `docs/<slug>` for docs-only, otherwise `chore/<slug>` from `main`.

        **Implementation rules:**
        - Refactors must not change observable behaviour — if behaviour must change, open a bug or feature issue instead
        - All sidebar DOM access must use the `getEl()` helper — never `document.getElementById` directly
        - Sidebar CSS lives as `SIDEBAR_CSS` string inside `content.js` — do not add external stylesheets
        - If a pattern seems wrong, stop — leave a comment in the PR instead of fixing it silently

        **Documentation — update if your change affects:**
        - `README.md` — setup steps, file structure, or architecture description
        - `docs/` — store listing or privacy policy

        **Pull request description must include:**
        1. **What & why** — 2–4 sentences
        2. **Files touched** — bullet list
        3. **How to verify no regression** — exact steps to confirm nothing broke
        4. **State doc updates needed** — list any items in `bookmarklets-state.md` that should be moved or updated (do not edit the file yourself — note them here)
        5. **Docs updated?** — yes/no, and which files

        **Hard rules — never break these:**
        - Manifest V3 — no deprecated APIs
        - `options_ui` not `options_page` in manifest
        - Shadow DOM only for sidebar elements — always use `getEl()`
        - `chrome.scripting.executeScript` for JS snippets, called from `background.js`
        - Dynamic tokens (`{random}`, `{random:N}`, `{ts}`, `{date}`) resolved in `resolveTokens()` in `content.js` — do not resolve them elsewhere
        - Import must always construct `{ groups: parsed.groups }` — never assign parsed JSON directly to `bmlData`
        - Switch Root must normalise protocol before navigating — bare domains must get `https://` prepended
        - Export must strip `urlGroupIds` for portability

        If a hard rule conflicts with the task, do not proceed. Open a draft PR with a comment explaining the conflict.
